<!DOCTYPE html>
<html>
<head>
  <title>Jake Sentinel Deal Analyzer v12.5</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .tab { display: none; }
    .tab.active { display: block; }
    button { margin: 5px; }
  </style>
</head>

<body>

<h1>Jake Sentinel Deal Analyzer v12.5</h1>

<button onclick="showTab('inputs')">Inputs</button>
<button onclick="showTab('debt')">Debt</button>
<button onclick="showTab('results')">Results</button>
<button onclick="showTab('investor')">Investor</button>
<button onclick="showTab('outputs')">Outputs</button>

<div id="inputs" class="tab active">
  <h2>Inputs</h2>
  <input id="price" value="100000"><br><br>
  <input id="down" value="25000"><br><br>
  <input id="noi" value="20000"><br>
</div>

<div id="debt" class="tab">
  <h2>Debt</h2>
  <div id="debtOutput"></div>
</div>

<div id="results" class="tab">
  <h2>Results</h2>
  <div id="resultsOutput"></div>
</div>

<div id="investor" class="tab">
  <h2>Investor</h2>
  <div id="investorOutput"></div>
</div>

<div id="outputs" class="tab">
  <h2>Outputs</h2>
  <div id="outputsOutput"></div>
</div>

<script>
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  calculate();
}

function calculate() {
  let price = Number(document.getElementById("price").value);
  let down = Number(document.getElementById("down").value);
  let noi = Number(document.getElementById("noi").value);
  
  let loan = price - down;
  let dscr = noi / (loan * 0.08);

  document.getElementById("debtOutput").innerHTML =
    "Loan: $" + loan;

  document.getElementById("resultsOutput").innerHTML =
    "DSCR: " + dscr.toFixed(2);

  document.getElementById("investorOutput").innerHTML =
    "Equity: $" + down;

  document.getElementById("outputsOutput").innerHTML =
    "Deal Summary:<br>Price $" + price + "<br>NOI $" + noi;
}

calculate();
</script>

</body>
</html>
